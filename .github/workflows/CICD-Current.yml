---
name: CICD
on:
  workflow_dispatch: 
   inputs:
    environment:
     description: envt where these workflows is done.
     default: 'dev'
     required: true
     type: choice
     options:
        - dev
        - prod
        - staging
jobs:
  Code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code Clone from GitHub"
  Build:
    needs: [Code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker Container
        run: echo "Build docker container"
  Test:
    needs: [Build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the Container
        run: echo "Testing the container"
  Deploy:
    if: inputs.environment=='dev' 
    needs: [Build,Test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the App
        run: echo "Docker compose deployed the App"
